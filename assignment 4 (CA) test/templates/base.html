<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}CS Quiz Engine{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --correct: #10b981;
      --wrong: #ef4444;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 10% 0%, rgba(124,58,237,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 100%, rgba(6,182,212,0.10) 0%, transparent 50%);
    }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(18,18,26,0.8);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent2);
      letter-spacing: 0.1em;
      text-decoration: none;
    }
    .nav-brand span { color: var(--accent); }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      font-size: 0.9rem; font-weight: 600;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    main { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border: none; border-radius: var(--radius);
      font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9333ea);
      color: #fff;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand"><span>CS</span>_QUIZ</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/test">Take Test</a>
      <a href="/history">History</a>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
